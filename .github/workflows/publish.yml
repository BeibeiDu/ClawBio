name: Publish to PyPI

# Publish clawbio to PyPI whenever a version tag is pushed, e.g. `git tag v0.5.3 && git push --tags`.
# Authentication uses PyPI Trusted Publishing (OIDC): no API token or secret is stored in the repo.
# One-time PyPI setup is required (see packaging/README.md): pypi.org/project/clawbio -> Settings ->
# Publishing -> add a GitHub trusted publisher with repo ClawBio/ClawBio, workflow `publish.yml`,
# environment `pypi`.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6.8.0

      - name: Verify tag matches package version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(python3 -c "import re, pathlib; print(re.search(r'__version__\s*=\s*\"([^\"]+)\"', pathlib.Path('clawbio/__init__.py').read_text()).group(1))")
          echo "tag version: $TAG | package version: $PKG"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag v$TAG does not match clawbio/__init__.py version $PKG. Bump the version before tagging."
            exit 1
          fi

      - name: Build sdist and wheel
        run: uv build

      - name: Check distribution metadata
        run: uvx twine check dist/*

      - name: Upload dist artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/clawbio/
    permissions:
      id-token: write # OIDC token for PyPI Trusted Publishing (no stored secret)
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
